{% extends "base.html" %}
{% block title %}登入{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 bg-gray-800 p-8 rounded-lg border border-gray-700">
  <h1 class="text-2xl font-bold mb-6 text-center">Admin 登入</h1>
  <form method="post" action="/admin/login" class="space-y-4">
    <div>
      <label class="block text-sm text-gray-400 mb-1">帳號</label>
      <input type="text" name="username" required
             class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded focus:outline-none focus:border-pink-500">
    </div>
    <div>
      <label class="block text-sm text-gray-400 mb-1">密碼</label>
      <input type="password" name="password" required
             class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded focus:outline-none focus:border-pink-500">
    </div>
    <button type="submit" class="w-full py-2 bg-pink-600 hover:bg-pink-500 rounded font-semibold">
      登入
    </button>
  </form>
</div>
{% endblock %}
