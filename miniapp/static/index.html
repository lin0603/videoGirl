<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>videoGirl Stars</title>
    <link rel="stylesheet" href="/miniapp-static/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Telegram Stars</p>
          <h1>videoGirl</h1>
        </div>
        <span id="status" class="status">連線中</span>
      </section>

      <section class="balance">
        <div>
          <span class="label">數位商品</span>
          <strong id="product-title">寫真解鎖包</strong>
        </div>
        <div class="stars"><span id="product-price">25</span> Stars</div>
      </section>

      <section class="products" aria-label="數位商品">
        <button class="product active" data-product="photo_pack" data-title="寫真解鎖包" data-price="25">
          <span>寫真解鎖包</span>
          <b>25</b>
        </button>
        <button class="product" data-product="vip_day" data-title="VIP 一日體驗" data-price="99">
          <span>VIP 一日體驗</span>
          <b>99</b>
        </button>
      </section>

      <button id="pay" class="pay" type="button">用 Stars 付款</button>
      <p id="message" class="message">公開頁面維持 SFW；付款僅購買數位內容與虛擬權益。</p>
    </main>
    <script src="/miniapp-static/app.js"></script>
  </body>
</html>
