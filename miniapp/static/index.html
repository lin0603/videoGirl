<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>videoGirl</title>
    <link rel="stylesheet" href="/miniapp-static/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- Tab nav -->
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="home">💕 主頁</button>
        <button class="tab-btn" data-tab="personas">👤 人設</button>
        <button class="tab-btn" data-tab="wallet">💳 錢包</button>
        <button class="tab-btn" data-tab="gallery">🖼️ 相簿</button>
        <button class="tab-btn" data-tab="store">🛍️ 商店</button>
      </nav>

      <!-- Home tab -->
      <section class="tab-pane active" id="tab-home">
        <div class="hero">
          <div class="avatar" id="home-avatar">💕</div>
          <h2 id="home-persona-name">正在載入...</h2>
          <p class="subtitle" id="home-level-label">關係：陌生人</p>
        </div>
        <div class="stat-card">
          <div class="stat">
            <span class="stat-label">親密分數</span>
            <strong id="home-score">—</strong>
          </div>
          <div class="stat">
            <span class="stat-label">連續天數</span>
            <strong id="home-streak">—</strong>
          </div>
          <div class="stat">
            <span class="stat-label">VIP</span>
            <strong id="home-vip">—</strong>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat">
            <span class="stat-label">點數餘額</span>
            <strong id="home-balance">—</strong>
          </div>
        </div>
        <p id="home-msg" class="hint">載入中…</p>
      </section>

      <!-- Personas tab -->
      <section class="tab-pane" id="tab-personas">
        <h2 class="screen-title">選擇女友人設</h2>
        <div id="personas-list" class="card-list"></div>
        <p id="personas-msg" class="hint">載入中…</p>
      </section>

      <!-- Gallery tab -->
      <section class="tab-pane" id="tab-gallery">
        <h2 class="screen-title">我的相簿</h2>
        <div id="gallery-list" class="card-list"></div>
        <p id="gallery-msg" class="hint">載入中…</p>
      </section>

      <!-- Wallet tab -->
      <section class="tab-pane" id="tab-wallet">
        <h2 class="screen-title">點數錢包</h2>
        <div class="stat-card big-card">
          <span class="stat-label">目前餘額</span>
          <strong class="big-number" id="wallet-balance">—</strong>
          <span class="stat-label">點</span>
        </div>
        <h3 class="section-label">儲值點數</h3>
        <div id="topup-products" class="card-list"></div>
        <p id="wallet-msg" class="hint"></p>
      </section>

      <!-- Store tab -->
      <section class="tab-pane" id="tab-store">
        <h2 class="screen-title">Stars 商店</h2>
        <div id="store-products" class="card-list"></div>
        <p id="store-msg" class="hint">所有購買均為數位內容與虛擬服務。</p>
      </section>
    </div>

    <script src="/miniapp-static/app.js"></script>
  </body>
</html>
