# Production Docker Compose for self-hosting or Coolify.
# This stack includes the Telegram bot worker, admin web UI, PostgreSQL with pgvector, and Redis.
services:
  app:
    # 由 Coolify 在主機本地 build（不依賴 GitHub Actions / GHCR）。
    build:
      context: .
      dockerfile: Dockerfile
    image: videogirl:latest
    container_name: videogirl-bot
    ports:
      - "3000:3000"
    environment:
      # Override local dev defaults to use the compose service hostnames.
      # All other env vars (telegram_token, ollama_base_url, etc.) are injected
      # by Coolify or passed with `docker compose --env-file .env up -d`.
      postgres_url: postgresql://videogirl:${POSTGRES_PASSWORD:-videogirl}@postgres:5432/videogirl
      redis_url: redis://redis:6379/0
      breezyvoice_base_url: ${breezyvoice_base_url:-}
      BREEZYVOICE_URL: ${BREEZYVOICE_URL:-}
      breezyvoice_token: ${breezyvoice_token:-}
      BREEZYVOICE_TOKEN: ${BREEZYVOICE_TOKEN:-}
      # task #10: media pipeline — bot enqueues photo jobs; worker delivers via this callback.
      media_callback_url: ${media_callback_url:-http://app:3000/internal/media_done}
      media_callback_secret: ${media_callback_secret:-}
      comfyui_gateway_url: ${comfyui_gateway_url:-http://192.168.0.140:9188}
      comfyui_gateway_token: ${comfyui_gateway_token:-}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # task #10: GPU media worker — consumes the Redis photo/video queue and calls the
  # ComfyUI Station Gateway (on the 4090, reached via the Coolify→4090 autossh tunnel).
  worker:
    image: videogirl:latest  # 重用 app 在本地 build 的同一映像
    container_name: videogirl-worker
    command: /app/.venv/bin/python -m workers.worker
    environment:
      telegram_token: ${telegram_token:-}
      postgres_url: postgresql://videogirl:${POSTGRES_PASSWORD:-videogirl}@postgres:5432/videogirl
      redis_url: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      ollama_base_url: ${ollama_base_url:-http://127.0.0.1:11434}
      comfyui_base_url: ${comfyui_base_url:-http://127.0.0.1:8188}
      embedding_model: ${embedding_model:-BAAI/bge-m3}
      model_name: ${model_name:-}
      comfyui_gateway_url: ${comfyui_gateway_url:-http://192.168.0.140:9188}
      comfyui_gateway_token: ${comfyui_gateway_token:-}
      media_callback_secret: ${media_callback_secret:-}
      CALLBACK_SECRET: ${media_callback_secret:-}
      MAX_RETRIES: "3"
      BLPOP_TIMEOUT: "30"
    depends_on:
      - redis
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: videogirl-postgres
    environment:
      POSTGRES_USER: videogirl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-videogirl}
      POSTGRES_DB: videogirl
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videogirl -d videogirl"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: videogirl-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
