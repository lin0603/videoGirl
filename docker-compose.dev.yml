services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: videogirl-postgres
    environment:
      POSTGRES_USER: videogirl
      POSTGRES_PASSWORD: videogirl
      POSTGRES_DB: videogirl
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videogirl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: videogirl-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
